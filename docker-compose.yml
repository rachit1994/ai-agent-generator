# Local Postgres + pgvector for developers (Phase 0). Same image family should be used in CI when DB-backed tests land.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: persona
      POSTGRES_PASSWORD: persona_dev_only
      POSTGRES_DB: persona
    ports:
      - "5432:5432"
    volumes:
      - ./migrations/docker-init:/docker-entrypoint-initdb.d:ro
