[project]
name = "persona-agent-platform"
version = "0.0.0"
description = "Persona agent platform — Phase 0 CI and developer prerequisites"
requires-python = ">=3.13"
readme = "README.md"
dependencies = []

[dependency-groups]
dev = [
  "deepeval>=2.0.0,<3",
  "opentelemetry-api>=1.27.0,<2",
  "opentelemetry-exporter-otlp-proto-http>=1.27.0,<2",
  "opentelemetry-sdk>=1.27.0,<2",
  "pytest>=8.3.0,<9",
]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
addopts = "-q"

[tool.uv]
default-groups = ["dev"]
