[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "sde"
version = "0.2.0"
description = "SDE: local CLI for guarded vs baseline benchmarking (orchestrator runtime)"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
sde = "sde.cli.main:main"
agent = "sde.cli.main:main"

[dependency-groups]
dev = ["pytest>=8.0.0"]

[tool.pytest.ini_options]
testpaths = ["src/services/orchestrator/tests/unit"]

[tool.hatch.build.targets.wheel]
packages = ["src/services/orchestrator/runtime/sde"]
