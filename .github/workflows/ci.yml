name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  phase0-gates:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: persona
          POSTGRES_PASSWORD: persona_dev_only
          POSTGRES_DB: persona
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U persona -d persona"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - uses: astral-sh/setup-uv@v5

      - name: Sync Python dependencies (locked)
        run: uv sync --frozen

      - name: Postgres + pgvector reachable (matches docker-compose image family)
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: persona
          PGPASSWORD: persona_dev_only
          PGDATABASE: persona
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          psql -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS vector;"
          psql -v ON_ERROR_STOP=1 -c "SELECT extname, extversion FROM pg_extension WHERE extname = 'vector';" | grep -F vector

      # Phase 0 checklist item 4 — pytest + DeepEval + OTel (agentevals-ready export wiring):
      #   DeepEval: tests/test_deepeval_smoke.py
      #   OpenTelemetry: tests/test_otel_export_smoke.py, tests/test_otel_otlp_exporter_smoke.py
      - name: Pytest (DeepEval + OpenTelemetry smoke)
        run: uv run pytest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Promptfoo eval (deterministic echo provider)
        run: npx --yes promptfoo@0.118.0 eval -c promptfooconfig.yaml
