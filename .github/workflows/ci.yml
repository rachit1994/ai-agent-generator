name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run python -m compileall src/services/orchestrator/runtime/agent_mvp

      - name: Test
        run: uv run pytest
